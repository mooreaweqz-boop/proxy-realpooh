<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Control - Electro Glow</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #050505;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Canvas Background เอฟเฟกต์ไฟฟ้า */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* กล่อง UI สไตล์กระจกดำโปร่งแสง */
        .glass-container {
            position: relative;
            z-index: 2;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 255, 255, 0.03);
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-container:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 255, 255, 0.05);
        }

        h2 {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* รายการวิธีใช้งาน */
        .instruction-list {
            list-style: none;
            margin-bottom: 35px;
        }

        .instruction-list li {
            color: #b3b3b3;
            font-size: 1.05rem;
            margin-bottom: 16px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 0 12px 12px 0;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .instruction-list li:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.07);
            border-left-color: #ffffff;
            transform: translateX(6px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2), 0 0 10px rgba(255, 255, 255, 0.1);
        }

        /* ส่วนกรอกคีย์ */
        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        input[type="text"]:focus {
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.6);
        }

        input[type="text"]::placeholder {
            color: #555555;
        }

        /* ปุ่มกดยืนยันสุดเฟี้ยว */
        button {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.1);
        }

        button:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(255, 255, 255, 0.2), 0 0 15px rgba(255, 255, 255, 0.3);
        }

        button:active {
            transform: translateY(1px);
        }

        /* เอฟเฟกต์แสงวิ่งผ่านปุ่ม (Glow Flash) */
        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 30%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: 0.75s;
            animation: shine 3s infinite linear;
        }

        @keyframes shine {
            0% { left: -50%; }
            100% { left: 150%; }
        }

        /* ระบบแจ้งเตือนลอยได้ (Toast Notification) */
        .toast {
            position: fixed;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            color: #000000;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 20px rgba(255,255,255,0.2);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            bottom: 40px;
        }
    </style>
</head>
<body>

    <!-- พื้นหลังคลื่นไฟฟ้าเคลื่อนไหว -->
    <canvas id="bg-canvas"></canvas>

    <div class="glass-container">
        <h2>⚡ วิธีใช้งาน</h2>
        <ul class="instruction-list">
            <li>1. กรอก Key ของคุณ</li>
            <li>2. ดาวน์โหลด potatso บนไอโฟนของคุณ</li>
            <li>3. ตั้งค่า proxy บนแอป</li>
            <li>4. เปิดเกมเล่นได้เลย!!</li>
        </ul>

        <div class="input-wrapper">
            <input type="text" id="user-key" placeholder="ENTER YOUR ACCESS KEY..." autocomplete="off">
        </div>
        <button onclick="verifyKey()">ยืนยันคีย์</button>
    </div>

    <!-- กล่องแจ้งเตือน -->
    <div id="toast-msg" class="toast"></div>

    <script>
        // --- ระบบแจ้งเตือนแบบสมูธ (Toast) ---
        function showToast(message) {
            const toast = document.getElementById('toast-msg');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function verifyKey() {
            const keyInput = document.getElementById('user-key').value.trim();
            if (keyInput === "") {
                showToast("❌ กรุณากรอก Key ของคุณก่อนกดยืนยัน!");
                return;
            }
            showToast("⚡ กำลังตรวจสอบสิทธิ์คีย์ของคุณ...");
        }

        // --- ระบบสร้างคลื่นไฟฟ้าฉากหลัง (Canvas Animation) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.alpha = Math.random() * 0.5 + 0.1;
                this.fadeRate = Math.random() * 0.005 + 0.002;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.fadeRate;

                if (this.alpha <= 0 || this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        const particles = [];
        const particleCount = 45; 
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // วาดเส้นโยงกระแสไฟฟ้าแบบบางเบาและสมูธ
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 180) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
