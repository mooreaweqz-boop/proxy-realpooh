<script>
    // URL ของไฟล์ที่มีรายชื่อคีย์ (คุณต้องไปสร้างไฟล์ txt หรือ json ไว้ที่เว็บนั้น)
    const KEY_SOURCE_URL = "https://mooreaweqz-boop.github.io/key-proxy-roblox/keys.txt"; 

    async function verifyKey() {
        const inputKey = document.getElementById('user-key').value.trim();
        
        try {
            const response = await fetch(KEY_SOURCE_URL);
            const text = await response.text();
            
            // ตรวจสอบว่าคีย์ที่กรอกอยู่ในไฟล์นั้นไหม
            if (text.includes(inputKey) && inputKey !== "") {
                document.getElementById('instruction-zone').style.display = 'none';
                document.getElementById('key-zone').style.display = 'none';
                document.getElementById('download-zone').style.display = 'flex';
                showToast("✅ คีย์ถูกต้อง!");
            } else {
                showToast("❌ คีย์ไม่ถูกต้อง หรือไม่มีในระบบ");
            }
        } catch (err) {
            showToast("⚠️ ไม่สามารถตรวจสอบคีย์ได้ในขณะนี้");
        }
    }
    
    // ฟังก์ชันเดิมที่มีอยู่แล้ว
    function showToast(msg) { const t = document.getElementById('toast-msg'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
</script>
