<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Proxy Login</title>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .box { 
            border: 1px solid #333; 
            padding: 30px; 
            text-align: center; 
            width: 320px; 
            border-radius: 15px; 
            background: #111;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border: 1px solid #444; 
            background: #000; 
            color: white; 
            box-sizing: border-box;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #fff; 
            color: #000; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="box" id="login-box">
        <h3>LOGIN KEY</h3>
        <input type="text" id="key" placeholder="proxy-roblox-1day-XXXXX">
        <button onclick="checkKey()">ยืนยัน</button>
    </div>

    <div class="box" id="content-box" style="display:none;">
        <h3>✅ เข้าสู่ระบบสำเร็จ</h3>
        <a href="https://apps.apple.com/th/app/potatso/id1239860606?l=th" style="color:cyan; display:block; margin-top:15px;">ดาวน์โหลดแอป</a>
    </div>

    <script>
        function checkKey() {
            let key = document.getElementById('key').value.trim();
            
            // ตรวจสอบรูปแบบ: ต้องขึ้นต้นด้วย proxy-roblox-1day- และตามด้วยตัวอักษร 1 ตัวขึ้นไป
            const regex = /^proxy-roblox-1day-[a-zA-Z]+$/;
            
            if (regex.test(key)) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('content-box').style.display = 'block';
            } else {
                alert("❌ คีย์ไม่ถูกต้อง! รูปแบบต้องเป็น: proxy-roblox-1day-ตามด้วยตัวอักษร");
            }
        }
    </script>
</body>
</html>
